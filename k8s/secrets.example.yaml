# Example Kubernetes secrets for Novacart microservices.
# Copy and fill in production values: kubectl apply -f secrets.yaml
# NEVER commit real secrets to git.

apiVersion: v1
kind: Secret
metadata:
  name: novacart-db-migrate
  namespace: novacart
type: Opaque
stringData:
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "postgres"
  DB_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-redis
  namespace: novacart
type: Opaque
stringData:
  ConnectionStrings__Redis: "redis:6379"
  Jwt__Secret: "your-super-secret-key-change-in-production-at-least-32-chars"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-otel
  namespace: novacart
type: Opaque
stringData:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-db-auth
  namespace: novacart
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=novacart_auth;Username=postgres;Password=CHANGE_ME"
  Jwt__Secret: "your-super-secret-key-change-in-production-at-least-32-chars"
  Microservices__IsolatedDatabases: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-db-product
  namespace: novacart
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=novacart_product;Username=postgres;Password=CHANGE_ME"
  Jwt__Secret: "your-super-secret-key-change-in-production-at-least-32-chars"
  Microservices__IsolatedDatabases: "true"
  Aws__S3__Bucket: "novacart-product-images"
  Aws__S3__Region: "us-east-1"
  Aws__S3__AccessKey: "CHANGE_ME"
  Aws__S3__SecretKey: "CHANGE_ME"
  Aws__S3__PublicBaseUrl: "https://cdn.example.com/novacart"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-db-cart
  namespace: novacart
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=novacart_cart;Username=postgres;Password=CHANGE_ME"
  Jwt__Secret: "your-super-secret-key-change-in-production-at-least-32-chars"
  Microservices__IsolatedDatabases: "true"
  Microservices__UseRefitCatalog: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-db-commerce
  namespace: novacart
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=novacart_commerce;Username=postgres;Password=CHANGE_ME"
  RabbitMQ__ManagementUrl: "http://rabbitmq:15672"
  RabbitMQ__Username: "guest"
  RabbitMQ__Password: "CHANGE_ME"
  RabbitMQ__DlqPollSeconds: "60"
  Stripe__SecretKey: "sk_live_CHANGE_ME"
  Stripe__PublishableKey: "pk_live_CHANGE_ME"
  Stripe__WebhookSecret: "whsec_CHANGE_ME"
  Jwt__Secret: "your-super-secret-key-change-in-production-at-least-32-chars"
  Microservices__IsolatedDatabases: "true"
  Microservices__UseRefitCatalog: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: novacart-rabbitmq
  namespace: novacart
type: Opaque
stringData:
  ConnectionStrings__RabbitMQ: "amqp://guest:CHANGE_ME@rabbitmq:5672"
