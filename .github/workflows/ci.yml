name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: restore → build → test ────────────────────
  backend-test:
    name: Backend Tests (.NET 8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore ../backend.Tests/Novacart.Api.Tests.csproj

      - name: Build
        run: dotnet build ../backend.Tests/Novacart.Api.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test ../backend.Tests/Novacart.Api.Tests.csproj --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend.Tests/TestResults/**/coverage.cobertura.xml

  # ── Frontend: install → test → type-check ──────────────
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # ── Frontend: production build (TypeScript + Next.js) ──
  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest
    needs: [frontend-test]
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

  # ── Docker: verify microservices stack builds ─────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build microservices stack
        run: docker compose build db-migrate gateway auth-api product-api cart-api order-api frontend

      - name: E2E smoke (optional services)
        run: |
          docker compose up -d postgres redis rabbitmq jaeger db-migrate auth-api product-api cart-api order-api gateway
          chmod +x scripts/e2e-microservices-smoke.sh
          ./scripts/e2e-microservices-smoke.sh || true
        continue-on-error: true
